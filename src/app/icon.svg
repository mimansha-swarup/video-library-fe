<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0C0A08"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14" stroke="#D4A84B" stroke-width="1.2" opacity="0.6"/>
  <!-- Inner hub -->
  <circle cx="16" cy="16" r="5.5" stroke="#D4A84B" stroke-width="1.2" opacity="0.9"/>
  <!-- Cardinal sprocket holes -->
  <circle cx="16" cy="5"  r="2.2" fill="#D4A84B" opacity="0.75"/>
  <circle cx="16" cy="27" r="2.2" fill="#D4A84B" opacity="0.75"/>
  <circle cx="5"  cy="16" r="2.2" fill="#D4A84B" opacity="0.75"/>
  <circle cx="27" cy="16" r="2.2" fill="#D4A84B" opacity="0.75"/>
  <!-- Diagonal sprocket holes -->
  <circle cx="8.5"  cy="8.5"  r="1.6" fill="#D4A84B" opacity="0.5"/>
  <circle cx="23.5" cy="8.5"  r="1.6" fill="#D4A84B" opacity="0.5"/>
  <circle cx="8.5"  cy="23.5" r="1.6" fill="#D4A84B" opacity="0.5"/>
  <circle cx="23.5" cy="23.5" r="1.6" fill="#D4A84B" opacity="0.5"/>
</svg>
